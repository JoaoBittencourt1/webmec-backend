services:
  postgres:
    image: postgres:16-alpine
    container_name: webmec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webmec
      POSTGRES_PASSWORD: webmec123
      POSTGRES_DB: webmec_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webmec -d webmec_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webmec-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://webmec:webmec123@postgres:5432/webmec_db?schema=public
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
